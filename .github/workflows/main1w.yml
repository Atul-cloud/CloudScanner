name: Beast 1W Weekly Global Scanner

on:
  schedule:
    # Triggers at exactly 5:30 PM UTC every Friday (11:00 PM IST)
    - cron: '30 17 * * 5'
  
  # Preserves manual testing action button
  workflow_dispatch:

jobs:
  run-scanner:
    runs-on: ubuntu-latest

    steps:
    - name: Clone Repository Code
      uses: actions/checkout@v4

    - name: Initialize Cloud Python Engine
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Application Requirements
      run: |
        python -m pip install --upgrade pip
        pip install yfinance pandas requests

    - name: Execute 1-Week Global Horizon Scan
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python Beast_scanner_1w.py
      
